<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Trolley | 超级大电车</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
        color: #1c1917;
        background:
          linear-gradient(rgba(255, 255, 255, 0.32) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.32) 1px, transparent 1px),
          #f7f3ea;
        background-size: 28px 28px;
      }

      button {
        font: inherit;
        cursor: pointer;
      }

      .screen {
        min-height: 100vh;
        padding: 24px 16px;
      }

      .wrap {
        width: min(100%, 980px);
        margin: 0 auto;
      }

      .center {
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      .eyebrow {
        display: inline-flex;
        padding: 6px 10px;
        border: 1px solid #d6d3d1;
        background: rgba(255, 255, 255, 0.75);
        color: #57534e;
        font-size: 14px;
        font-weight: 700;
      }

      h1 {
        margin: 18px 0 0;
        font-size: clamp(38px, 9vw, 72px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      h2 {
        margin: 0;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        line-height: 1.8;
      }

      .lead {
        max-width: 680px;
        color: #57534e;
        font-size: 18px;
      }

      .notice {
        max-width: 720px;
        margin-top: 24px;
        padding: 16px;
        border-left: 4px solid #d97706;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 18px 60px rgba(31, 41, 55, 0.12);
        color: #57534e;
      }

      .primary {
        width: 100%;
        max-width: 240px;
        margin-top: 28px;
        padding: 16px 20px;
        border: 0;
        border-radius: 4px;
        background: #1c1917;
        color: white;
        font-weight: 900;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 20px;
      }

      @media (min-width: 640px) {
        .actions {
          grid-template-columns: 1fr 1fr;
        }
      }

      .secondary {
        width: 100%;
        padding: 16px 20px;
        border: 1px solid #1c1917;
        border-radius: 4px;
        background: white;
        color: #1c1917;
        font-weight: 900;
      }

      .secondary:hover {
        background: #fffbeb;
      }

      .primary:hover {
        background: #047857;
      }

      .layout {
        display: grid;
        gap: 20px;
      }

      @media (min-width: 880px) {
        .layout {
          grid-template-columns: 1fr 280px;
        }
      }

      .card,
      .panel {
        overflow: hidden;
        border: 1px solid #e7e5e4;
        border-radius: 6px;
        background: white;
        box-shadow: 0 18px 60px rgba(31, 41, 55, 0.12);
      }

      .panel {
        padding: 18px;
      }

      .progress-meta {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        color: #78716c;
        font-size: 12px;
        font-weight: 900;
      }

      .track {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #e7e5e4;
      }

      .fill {
        height: 100%;
        border-radius: 999px;
        background: #059669;
        transition: width 220ms ease;
      }

      .illustration {
        position: relative;
        height: 224px;
        overflow: hidden;
        background: linear-gradient(135deg, #d1fae5, #fef3c7, #fff);
      }

      .illustration.utilitarian {
        background: radial-gradient(circle at 78% 24%, rgba(250, 204, 21, 0.55), transparent 24%),
          linear-gradient(135deg, #bbf7d0, #fef3c7, #fff);
      }

      .illustration.deontological {
        background: radial-gradient(circle at 78% 24%, rgba(125, 211, 252, 0.55), transparent 24%),
          linear-gradient(135deg, #dbeafe, #e0f2fe, #fff);
      }

      .illustration.empathetic {
        background: radial-gradient(circle at 78% 24%, rgba(251, 113, 133, 0.45), transparent 24%),
          linear-gradient(135deg, #ffe4e6, #fef3c7, #fff);
      }

      .illustration.balanced {
        background: radial-gradient(circle at 78% 24%, rgba(163, 230, 53, 0.42), transparent 24%),
          linear-gradient(135deg, #ecfccb, #e0f2fe, #fff);
      }

      .road {
        position: absolute;
        inset-inline: 0;
        bottom: 0;
        height: 48px;
        background: #292524;
      }

      .rail {
        position: absolute;
        left: 11%;
        right: 11%;
        bottom: 58px;
        height: 12px;
        border-radius: 999px;
        background: #44403c;
      }

      .trolley {
        position: absolute;
        left: 18%;
        bottom: 72px;
        width: 132px;
        height: 82px;
        border: 4px solid #292524;
        border-radius: 8px;
        background: #10b981;
        animation: idle 3s infinite ease-in-out;
      }

      .trolley.utilitarian {
        background: #10b981;
        box-shadow: 0 0 0 8px rgba(16, 185, 129, 0.18), 0 18px 42px rgba(16, 185, 129, 0.32);
      }

      .trolley.deontological {
        background: #0ea5e9;
        box-shadow: 0 0 0 8px rgba(14, 165, 233, 0.18), 0 18px 42px rgba(14, 165, 233, 0.3);
      }

      .trolley.empathetic {
        background: #fb7185;
        box-shadow: 0 0 0 8px rgba(251, 113, 133, 0.18), 0 18px 42px rgba(251, 113, 133, 0.3);
      }

      .trolley.balanced {
        background: #f59e0b;
        box-shadow: 0 0 0 8px rgba(245, 158, 11, 0.16), 0 18px 42px rgba(245, 158, 11, 0.28);
      }

      .trolley-badge {
        position: absolute;
        left: 50%;
        top: -22px;
        display: grid;
        width: 36px;
        height: 30px;
        transform: translateX(-50%);
        place-items: center;
        border: 3px solid #292524;
        border-radius: 999px;
        background: #fff7ed;
        font-size: 17px;
        font-weight: 900;
      }

      .window {
        position: absolute;
        top: 12px;
        width: 34px;
        height: 30px;
        border-radius: 4px;
        background: #fef3c7;
      }

      .window.one {
        left: 14px;
      }

      .window.two {
        right: 14px;
      }

      .wheel {
        position: absolute;
        bottom: -24px;
        width: 42px;
        height: 42px;
        border: 4px solid #292524;
        border-radius: 999px;
        background: #fafaf9;
      }

      .wheel.one {
        left: 20px;
      }

      .wheel.two {
        right: 20px;
      }

      .passenger {
        position: absolute;
        top: 46px;
        width: 18px;
        height: 18px;
        border: 3px solid #292524;
        border-radius: 999px;
        background: #fde68a;
      }

      .passenger::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 5px;
        width: 6px;
        height: 3px;
        border-bottom: 2px solid #292524;
        border-radius: 999px;
      }

      .person {
        position: absolute;
        bottom: 49px;
        width: 20px;
        height: 32px;
        animation: bounce 2.4s infinite ease-in-out;
      }

      .person .head {
        position: absolute;
        left: 3px;
        top: 0;
        width: 14px;
        height: 14px;
        border: 2px solid #292524;
        border-radius: 999px;
        background: #fde68a;
      }

      .person .body {
        position: absolute;
        left: 5px;
        top: 14px;
        width: 10px;
        height: 17px;
        border: 2px solid #292524;
        border-radius: 6px 6px 2px 2px;
        background: #60a5fa;
      }

      .person::after {
        content: "";
        position: absolute;
        left: 7px;
        top: 6px;
        width: 6px;
        height: 3px;
        border-bottom: 2px solid #292524;
        border-radius: 999px;
      }

      .person:nth-of-type(2n) .body {
        background: #fb7185;
      }

      .person:nth-of-type(3n) .body {
        background: #34d399;
      }

      .spark {
        position: absolute;
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        font-weight: 900;
        animation: floaty 2.8s infinite ease-in-out;
      }

      .signal {
        position: absolute;
        left: 26px;
        top: 22px;
        display: flex;
        gap: 7px;
        align-items: center;
        color: #292524;
        font-size: 12px;
        font-weight: 900;
      }

      .signal-dot {
        width: 14px;
        height: 14px;
        border: 2px solid #292524;
        border-radius: 999px;
        background: #10b981;
      }

      @keyframes idle {
        0%,
        100% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(14px);
        }
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      @keyframes floaty {
        0%,
        100% {
          transform: translateY(0) rotate(-4deg);
        }
        50% {
          transform: translateY(-9px) rotate(4deg);
        }
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .tag {
        border: 1px solid #d6d3d1;
        border-radius: 4px;
        padding: 4px 8px;
        color: #57534e;
        font-size: 12px;
        font-weight: 800;
      }

      .content {
        padding: 20px;
      }

      .choices {
        display: grid;
        gap: 12px;
        margin-top: 22px;
      }

      .choice {
        width: 100%;
        padding: 15px;
        border: 1px solid #d6d3d1;
        border-radius: 6px;
        background: white;
        color: #1c1917;
        text-align: left;
        font-weight: 800;
        line-height: 1.6;
      }

      .choice:hover {
        border-color: #047857;
        background: #ecfdf5;
      }

      .choice.utilitarian:hover {
        border-color: #059669;
        background: #ecfdf5;
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.16);
      }

      .choice.deontology:hover {
        border-color: #0369a1;
        background: #e0f2fe;
        box-shadow: 0 0 0 3px rgba(3, 105, 161, 0.16);
      }

      .choice.empathy:hover {
        border-color: #f43f5e;
        background: #fff1f2;
        box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.14);
      }

      .choice.mixed:hover {
        border-color: #d97706;
        background: #fffbeb;
        box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.14);
      }

      .choice-id {
        display: inline-grid;
        width: 28px;
        height: 28px;
        margin-right: 10px;
        place-items: center;
        border-radius: 4px;
        background: #1c1917;
        color: white;
      }

      details {
        margin-top: 18px;
        border: 1px solid #e7e5e4;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.86);
      }

      summary {
        padding: 13px 15px;
        font-weight: 900;
      }

      .explain {
        border-top: 1px solid #e7e5e4;
        padding: 15px;
        color: #57534e;
        font-size: 14px;
      }

      .explain b {
        display: block;
        margin-top: 10px;
        color: #1c1917;
      }

      .score-row {
        margin-top: 12px;
      }

      .score-label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        color: #57534e;
        font-size: 12px;
        font-weight: 800;
      }

      .score-bar {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #e7e5e4;
      }

      .score-bar span {
        display: block;
        height: 100%;
        border-radius: 999px;
      }

      .u {
        background: #059669;
      }

      .d {
        background: #0369a1;
      }

      .e {
        background: #f43f5e;
      }

      .finale {
        position: relative;
        height: 260px;
        overflow: hidden;
        border-radius: 6px;
        background: #1c1917;
        color: white;
      }

      .finale.utilitarian {
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(135deg, #052e16, #111827 58%, #020617);
        background-size: 26px 100%, auto;
      }

      .finale.deontological {
        background:
          linear-gradient(90deg, rgba(186, 230, 253, 0.16) 1px, transparent 1px),
          linear-gradient(135deg, #082f49, #0f172a);
        background-size: 38px 100%, auto;
      }

      .finale.empathetic {
        background:
          radial-gradient(circle at 18% 28%, rgba(251, 207, 232, 0.55), transparent 20%),
          radial-gradient(circle at 76% 35%, rgba(254, 240, 138, 0.42), transparent 22%),
          linear-gradient(135deg, #831843, #9f1239);
      }

      .finale.balanced {
        background:
          radial-gradient(circle at 22% 30%, rgba(250, 204, 21, 0.4), transparent 18%),
          radial-gradient(circle at 76% 42%, rgba(125, 211, 252, 0.34), transparent 20%),
          linear-gradient(135deg, #292524, #312e81 62%, #0f172a);
      }

      .finale .trolley {
        bottom: 82px;
        animation: finale 2.6s infinite alternate ease-in-out;
      }

      .finale .trolley.utilitarian {
        animation: finale-charge 1.45s infinite alternate cubic-bezier(0.2, 0.9, 0.1, 1);
        filter: contrast(1.2);
      }

      .finale .trolley.deontological {
        animation: finale-order 3.4s infinite alternate ease-in-out;
      }

      .finale .trolley.empathetic {
        animation: finale-soft 3.1s infinite alternate ease-in-out;
      }

      .finale .trolley.balanced {
        animation: finale-dizzy 1.8s infinite alternate ease-in-out;
      }

      .finale-symbol {
        position: absolute;
        inset: auto 24px 22px auto;
        display: flex;
        gap: 8px;
        font-size: 28px;
        font-weight: 900;
        opacity: 0.86;
      }

      .finale-symbol span {
        display: inline-block;
        animation: floaty 2.4s infinite ease-in-out;
      }

      @keyframes finale {
        from {
          transform: translateX(-44%) scale(0.72);
        }
        to {
          transform: translateX(68vw) scale(1.12);
        }
      }

      @keyframes finale-charge {
        from {
          transform: translateX(-48%) scale(0.72) skewX(-5deg);
        }
        to {
          transform: translateX(72vw) scale(1.22) skewX(-8deg);
        }
      }

      @keyframes finale-order {
        from {
          transform: translateX(-36%) scale(0.78);
        }
        to {
          transform: translateX(58vw) scale(0.98);
        }
      }

      @keyframes finale-soft {
        from {
          transform: translateX(-38%) translateY(0) scale(0.76) rotate(-1deg);
        }
        to {
          transform: translateX(58vw) translateY(-10px) scale(1.02) rotate(1deg);
        }
      }

      @keyframes finale-dizzy {
        from {
          transform: translateX(-38%) translateY(-8px) scale(0.76) rotate(-7deg);
        }
        to {
          transform: translateX(52vw) translateY(10px) scale(1.02) rotate(8deg);
        }
      }

      .history {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .history-item {
        border: 1px solid #e7e5e4;
        border-radius: 6px;
        background: #fafaf9;
        padding: 12px;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const dilemmas = [
        ["失控电车", "classic", "low", "一辆电车即将撞向五个人。你可以切换轨道，但另一条轨道上有一个人。", ["切换轨道，牺牲一人", { utilitarian: 2, deontology: 0, empathy: 0 }], ["不干预，保持现状", { utilitarian: 0, deontology: 2, empathy: 1 }], { origin: "这是伦理学课堂里最常见的思想实验之一：一辆失控电车冲向五个人，旁观者面前有一个道岔。只要扳动开关，电车就会改道，五个人会得救，但另一条轨道上的一个人会被牵连。", consequence: "这个原型没有真实案件后果，它的“后果”来自选择结构本身：扳动开关意味着主动造成一人的损失，不扳动则意味着允许五人的危险继续发生。", discussion: "该题仅用于呈现结果最大化、不得主动伤害与共情直觉之间的张力；现实判断需要结合具体事实、责任位置和制度环境。" }],
        ["胖子与天桥", "classic", "medium", "电车冲向五个人。桥上有一位体重足以拦车的人，你可以推他下去阻止电车。", ["推下他，阻止电车", { utilitarian: 2, deontology: 0, empathy: 0 }], ["不把他当作工具", { utilitarian: 0, deontology: 2, empathy: 1 }], { origin: "这个变体把旁观者放到天桥上：轨道下方仍有五个人处于危险中，桥上有一位无辜路人。如果把他推下去，他的身体会阻止电车，五个人会得救。", consequence: "与扳动开关不同，这里的行动更直接地把一个人当作拯救他人的工具，因此许多人会给出不同于经典电车题的直觉判断。", discussion: "该题仅用于呈现结果、规则、共情与“把人作为手段”之间的张力；现实判断需要更多事实与法律语境。" }],
        ["边沁的圆形监狱", "classic", "low", "边沁设想一座圆形监狱：中央监视塔能观察囚犯，囚犯却看不见看守；它还可交给私人承包商经营。", ["接受承包经营以提高效率", { utilitarian: 2, deontology: 0, empathy: 0 }], ["拒绝把监狱交给利润驱动", { utilitarian: 0, deontology: 2, empathy: 1 }], { origin: "边沁希望用功利主义原则为刑罚改革提供一种“道德科学”。圆形监狱是其中一个方案：中央监视塔可以观察囚犯，而囚犯看不见看守；他还建议可由私人承包商经营，并通过使用囚犯劳动取得利润。", consequence: "边沁的具体计划最终未被采纳，但私人公司承包监狱的观念在近现代美国和英国重新引发讨论，也让效率、人道刑罚和利润动机之间的矛盾变得更突出。", discussion: "该题仅用于呈现制度效率、人格尊严、监视权力和利润激励之间的张力；现实判断需要结合具体监管、法律与历史环境。" }],
        ["离开欧麦拉的人", "literary", "medium", "一座快乐城市的繁荣依赖一个孩子长期受苦。你可以留下享受秩序，也可以离开。", ["留下，接受多数人的幸福", { utilitarian: 2, deontology: 0, empathy: 0 }], ["离开，拒绝这种基础", { utilitarian: 0, deontology: 0, empathy: 3 }], { origin: "勒古恩的短篇描写了一座几乎完美的快乐城市，但这份幸福依赖一个孩子被长期关在地下室里受苦。城里的成年人知道这个秘密，并被告知一旦改变孩子的处境，城市的幸福就会崩塌。", consequence: "故事中，有些人接受这个安排并继续生活，也有些人在得知真相后默默离开欧麦拉。文本没有告诉读者他们去了哪里，只留下无法轻易解决的道德余震。", discussion: "该题仅用于呈现多数幸福、个体痛苦、旁观责任与拒绝共谋之间的张力；现实判断需要避免把复杂压迫结构简化成一道选择题。" }],
        ["阿富汗牧羊人", "historical", "high", "小队执行任务时遇到当地牧羊人。放人可能暴露位置，限制他们会侵犯无辜者。", ["优先任务安全", { utilitarian: 2, deontology: 0, empathy: 0 }], ["释放牧羊人", { utilitarian: 0, deontology: 1, empathy: 3 }], { origin: "2005年6月，马库斯·勒特雷尔和另外三名海豹突击队队员在阿富汗靠近巴基斯坦边界的山区执行秘密侦察任务，目标是一名塔利班领导人。小队在山脊上观察村庄时，遇到两名赶着羊群的阿富汗农民和一名约14岁的男孩。三人没有武器，但如果被释放，可能会把小队位置告诉塔利班。", consequence: "小队最终释放了牧羊人。约一个半小时后，四名士兵被数十名武装人员包围。随后的战斗中，勒特雷尔的三名战友遇难；一架试图救援的直升机也被击落，机上16名士兵全部遇难。", discussion: "该题仅用于呈现任务安全、平民权利、战友责任和战争规则之间的张力；现实判断需要结合战场事实、交战规则、指挥链和事后资料。" }],

              <div class="notice">内容仅用于思辨启蒙与娱乐，不构成法律、医疗、政治或道德建议。现实议题均经过抽象化处理。</div>
              <button class="primary" onclick="start()">开始模拟</button>
            </div>
          </section>
        `;
      }

      function renderGame() {
        const d = dilemmas[currentIndex];
        const progress = Math.round(((currentIndex + 1) / dilemmas.length) * 100);
        const key = profileKey();
        const mood = stageMood();
        const trolleyLeft = Math.min(56, 12 + progress * 0.42);
        app.innerHTML = `
          <section class="screen">
            <div class="wrap layout">
              <div>
                <div class="progress-meta"><span>${currentIndex + 1} / ${dilemmas.length}</span><span>${progress}%</span></div>
                <div class="track"><div class="fill" style="width:${progress}%"></div></div>
                <article class="card" style="margin-top:18px">
                  <div class="illustration ${key}">
                    <div class="signal"><span class="signal-dot" style="background:${mood.dot}"></span>${mood.label}</div>
                    <div class="rail"></div><div class="road"></div>
                    <div class="person" style="left:12%;animation-delay:.1s"><span class="head"></span><span class="body"></span></div>
                    <div class="person" style="left:75%;animation-delay:.4s"><span class="head"></span><span class="body"></span></div>
                    <div class="person" style="left:84%;animation-delay:.8s"><span class="head"></span><span class="body"></span></div>
                    <div class="spark" style="right:24%;top:74px">${mood.spark}</div>
                    <div class="spark" style="right:14%;top:118px;animation-delay:.4s">!</div>
                    <div class="trolley ${key}" style="left:${trolleyLeft}%">
                      <div class="trolley-badge">${mood.symbol}</div>
                      <div class="window one"></div><div class="window two"></div>
                      <span class="passenger" style="left:28px"></span>
                      <span class="passenger" style="right:28px"></span>
                      <div class="wheel one"></div><div class="wheel two"></div>
                    </div>
                    <div class="tag" style="position:absolute;right:18px;top:18px;background:rgba(255,255,255,.75)">cartoon scene</div>
                  </div>
                  <div class="content">
                    <div class="tag-row"><span class="tag">${d.category}</span><span class="tag">sensitivity: ${d.sensitivity}</span></div>
                    <h2>${titleEmoji(d)} ${d.title}</h2>
                    <p>${d.context}</p>
                    <div class="choices">
                      ${d.choices.map((c) => `<button class="choice ${choiceMood(c.score)}" onclick="choose('${c.id}')"><span class="choice-id">${c.id}</span>${c.text}</button>`).join("")}
                    </div>
                    <details>
                      <summary>资料与讨论</summary>
                      <div class="explain">
                        <b>简明来源</b>${d.explanation.origin}
                        <b>原型后果</b>${d.explanation.consequence}
                        <b>现实讨论</b>${d.explanation.discussion}
                      </div>
                    </details>
                  </div>
                </article>
              </div>
              ${scorePanel()}
            </div>
          </section>
        `;
      }

      function renderResult() {
        const [title, desc] = classify();
        const key = profileKey();
        const finale = {
          utilitarian: {
            line: "冷酷狂傲号启动：数字、速度和总收益把车灯打到最亮。",
            symbols: ["Σ", "+", "MAX"],
            extra: "效率至上"
          },
          deontological: {
            line: "平静秩序号进站：轨道、信号和边界都按规则排列。",
            symbols: ["§", "□", "OK"],
            extra: "原则优先"
          },
          empathetic: {
            line: "温和可爱号慢慢驶来：车厢里留着靠垫、热茶和一点点心软。",
            symbols: ["♥", "☺", "抱抱"],
            extra: "照护模式"
          },
          balanced: {
            line: "难以抉择号左右摇摆：三套原则都在驾驶室里抢方向盘。",
            symbols: ["?", "↔", "晕"],
            extra: "权衡中"
          }
        }[key];
        app.innerHTML = `
          <section class="screen">
            <div class="wrap">
              <div class="panel">
                <div class="eyebrow">Your profile</div>
                <h2 style="margin-top:14px;font-size:34px">${title}</h2>
                <p>${desc}</p>
                ${scorePanel()}
              </div>
              <div class="finale ${key}" style="margin-top:20px">
                <div class="rail"></div>
                <div class="trolley ${key}">
                  <div class="trolley-badge">${finale.symbols[0]}</div>
                  <div class="window one"></div><div class="window two"></div>
                  <span class="passenger" style="left:28px"></span>
                  <span class="passenger" style="right:28px"></span>
                  <div class="wheel one"></div><div class="wheel two"></div>
                </div>
                <div style="position:absolute;left:20px;right:20px;top:20px">
                  <b>${title}</b>
                  <p>${finale.line}</p>
                  <span class="tag" style="display:inline-flex;background:rgba(255,255,255,.12);color:white;border-color:rgba(255,255,255,.26)">${finale.extra}</span>
                </div>
                <div class="finale-symbol">
                  ${finale.symbols.map((item, index) => `<span style="animation-delay:${index * 0.25}s">${item}</span>`).join("")}
                </div>
              </div>
              <div class="panel" style="margin-top:20px">
                <h2 style="font-size:22px">回答历史</h2>
                <div class="history">${answers.map((a, i) => `<div class="history-item"><b>${String(i + 1).padStart(2, "0")} · ${a.title}</b><br>${a.choiceId}. ${a.text}<br><span style="color:#78716c;font-size:12px">结果 +${a.score.utilitarian || 0} · 规则 +${a.score.deontology || 0} · 共情 +${a.score.empathy || 0}</span></div>`).join("")}</div>
              </div>
              <div class="actions">
                <button class="secondary" onclick="downloadShareImage()">保存分享图</button>
                <button class="primary" style="max-width:none;margin-top:0" onclick="restart()">重新开始</button>
              </div>
            </div>
          </section>
        `;
      }

      function start() {
        phase = "game";
        currentIndex = 0;
        score = { utilitarian: 0, deontology: 0, empathy: 0 };
        answers = [];
        renderGame();
      }

      function choose(choiceId) {
        const d = dilemmas[currentIndex];
        const choice = d.choices.find((item) => item.id === choiceId);
        score.utilitarian += choice.score.utilitarian || 0;
        score.deontology += choice.score.deontology || 0;
        score.empathy += choice.score.empathy || 0;
        answers.push({ title: d.title, choiceId: choice.id, text: choice.text, score: choice.score });
        currentIndex += 1;
        if (currentIndex >= dilemmas.length) {
          phase = "result";
          renderResult();
        } else {
          renderGame();
        }
      }

      function restart() {
        renderIntro();
      }

      function downloadShareImage() {
        const [title, desc] = classify();
        const key = profileKey();
        const p = percentages();
        const width = 1200;
        const height = 1500;
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        const share = shareProfileCopy(key);
        const summary = summarizeAnswers();

        ctx.fillStyle = "#f7f3ea";
        ctx.fillRect(0, 0, width, height);
        drawGrid(ctx, width, height);
        roundRect(ctx, 54, 54, width - 108, height - 108, 18, "#ffffff");

        drawWideShareHero(ctx, key, 54, 54, width - 108, 300);

        ctx.fillStyle = "#1c1917";
        ctx.font = "900 36px 'Microsoft YaHei', sans-serif";
        ctx.fillText("Super Trolley 超级大电车", 90, 405);
        ctx.font = "900 58px 'Microsoft YaHei', sans-serif";
        ctx.fillText(title, 90, 477);
        ctx.font = "500 24px 'Microsoft YaHei', sans-serif";
        wrapText(ctx, desc, 90, 525, 520, 34);

        drawRadar(ctx, 880, 520, 145, p);

        drawShareBar(ctx, "结果导向", p.utilitarian, 690, 705, "#059669");
        drawShareBar(ctx, "规则导向", p.deontology, 690, 765, "#0369a1");
        drawShareBar(ctx, "共情导向", p.empathy, 690, 825, "#f43f5e");

        roundRect(ctx, 90, 650, 540, 172, 14, "#fafaf9");
        ctx.fillStyle = "#292524";
        ctx.font = "900 23px 'Microsoft YaHei', sans-serif";
        ctx.fillText(share.headline, 116, 690);
        ctx.font = "500 20px 'Microsoft YaHei', sans-serif";
        wrapText(ctx, share.analysis, 116, 724, 486, 30);

        ctx.fillStyle = "#292524";
        ctx.font = "900 30px 'Microsoft YaHei', sans-serif";
        ctx.fillText("选择速览", 90, 900);

        drawSummaryPill(ctx, "结果型选择", summary.utilitarian, 90, 940, "#059669");
        drawSummaryPill(ctx, "规则型选择", summary.deontology, 335, 940, "#0369a1");
        drawSummaryPill(ctx, "共情型选择", summary.empathy, 580, 940, "#f43f5e");
        drawSummaryPill(ctx, "混合型选择", summary.mixed, 825, 940, "#d97706");

        const highlights = pickHighlights();
        let y = 1040;
        highlights.forEach((answer, index) => {
          roundRect(ctx, 90, y - 34, 1020, 74, 12, index % 2 ? "#fafaf9" : "#f5f5f4");
          ctx.fillStyle = "#1c1917";
          ctx.font = "900 21px 'Microsoft YaHei', sans-serif";
          trimText(ctx, `${answer.title}`, 116, y, 330);
          ctx.font = "700 19px 'Microsoft YaHei', sans-serif";
          trimText(ctx, `${answer.choiceId}. ${answer.text}`, 470, y, 470);
          ctx.fillStyle = "#78716c";
          ctx.font = "700 16px 'Microsoft YaHei', sans-serif";
          ctx.fillText(choiceLabel(answer.score), 116, y + 28);
          y += 96;
        });

        ctx.fillStyle = "#78716c";
        ctx.font = "600 18px 'Microsoft YaHei', sans-serif";
        ctx.fillText(`完整作答 ${answers.length} 题，图中仅展示代表性选择。仅用于伦理思辨与娱乐，不代表标准答案。`, 90, height - 82);

        const link = document.createElement("a");
        link.download = `super-trolley-${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      function summarizeAnswers() {
        return answers.reduce((acc, answer) => {
          acc[choiceMood(answer.score)] += 1;
          return acc;
        }, { utilitarian: 0, deontology: 0, empathy: 0, mixed: 0 });
      }

      function pickHighlights() {
        const buckets = {};
        for (const answer of answers) {
          const mood = choiceMood(answer.score);
          if (!buckets[mood]) buckets[mood] = answer;
        }
        return [buckets.utilitarian, buckets.deontology, buckets.empathy, buckets.mixed]
          .filter(Boolean)
          .slice(0, 4);
      }

      function choiceLabel(scoreValue) {
        const label = {
          utilitarian: "主要推动车轮：结果导向",
          deontology: "主要推动车轮：规则导向",
          empathy: "主要推动车轮：共情导向",
          mixed: "主要推动车轮：混合影响"
        };
        return label[choiceMood(scoreValue)];
      }

      function drawSummaryPill(ctx, label, value, x, y, color) {
        roundRect(ctx, x, y - 34, 210, 58, 999, "#fafaf9");
        ctx.fillStyle = color;
        ctx.font = "900 28px 'Microsoft YaHei', sans-serif";
        ctx.fillText(String(value), x + 20, y + 4);
        ctx.fillStyle = "#44403c";
        ctx.font = "800 17px 'Microsoft YaHei', sans-serif";
        ctx.fillText(label, x + 64, y + 2);
      }

      function drawRadar(ctx, cx, cy, radius, p) {
        const axes = [
          { label: "结果", value: p.utilitarian, angle: -Math.PI / 2, color: "#059669" },
          { label: "规则", value: p.deontology, angle: Math.PI / 6, color: "#0369a1" },
          { label: "共情", value: p.empathy, angle: (5 * Math.PI) / 6, color: "#f43f5e" }
        ];
        roundRect(ctx, cx - 190, cy - 190, 380, 360, 18, "#fafaf9");
        ctx.strokeStyle = "#d6d3d1";
        ctx.lineWidth = 2;
        for (const step of [0.33, 0.66, 1]) {
          drawRadarPolygon(ctx, axes.map((axis) => pointOnAxis(cx, cy, radius * step, axis.angle)));
        }
        ctx.strokeStyle = "#a8a29e";
        axes.forEach((axis) => {
          const end = pointOnAxis(cx, cy, radius, axis.angle);
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(end.x, end.y);
          ctx.stroke();
        });
        const points = axes.map((axis) => pointOnAxis(cx, cy, radius * axis.value / 100, axis.angle));
        ctx.beginPath();
        points.forEach((point, index) => index ? ctx.lineTo(point.x, point.y) : ctx.moveTo(point.x, point.y));
        ctx.closePath();
        ctx.fillStyle = "rgba(245, 158, 11, .28)";
        ctx.fill();
        ctx.strokeStyle = "#f59e0b";
        ctx.lineWidth = 5;
        ctx.stroke();
        axes.forEach((axis) => {
          const labelPoint = pointOnAxis(cx, cy, radius + 34, axis.angle);
          if (axis.label === "结果") {
            labelPoint.y += 24;
          }
          ctx.fillStyle = axis.color;
          ctx.font = "900 20px 'Microsoft YaHei', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(`${axis.label} ${axis.value}%`, labelPoint.x, labelPoint.y);
        });
        ctx.textAlign = "left";
      }

      function drawRadarPolygon(ctx, points) {
        ctx.beginPath();
        points.forEach((point, index) => index ? ctx.lineTo(point.x, point.y) : ctx.moveTo(point.x, point.y));
        ctx.closePath();
        ctx.stroke();
      }

      function pointOnAxis(cx, cy, radius, angle) {
        return { x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius };
      }

      function drawWideShareHero(ctx, key, x, y, width, height) {
        const theme = {
          utilitarian: ["#052e16", "#10b981", "Σ", "MAX"],
          deontological: ["#082f49", "#0ea5e9", "§", "ORDER"],
          empathetic: ["#831843", "#fb7185", "♥", "CARE"],
          balanced: ["#312e81", "#f59e0b", "?", "MIX"]
        }[key];
        const gradient = ctx.createLinearGradient(x, y, x + width, y + height);
        gradient.addColorStop(0, theme[0]);
        gradient.addColorStop(1, "#111827");
        roundRect(ctx, x, y, width, height, 18, gradient);

        ctx.fillStyle = "rgba(255,255,255,.11)";
        for (let i = 0; i < 18; i++) {
          ctx.beginPath();
          ctx.arc(x + 72 + i * 58, y + 58 + (i % 3) * 38, 18, 0, Math.PI * 2);
          ctx.fill();
        }

        roundRect(ctx, x + 66, y + height - 74, width - 132, 14, 999, "rgba(255,255,255,.28)");
        roundRect(ctx, x + 66, y + height - 42, width - 132, 8, 999, "rgba(255,255,255,.14)");

        const tx = x + 590;
        const ty = y + 102;
        roundRect(ctx, tx, ty, 370, 116, 18, theme[1]);
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 7;
        ctx.stroke();
        roundRect(ctx, tx + 28, ty + 30, 72, 46, 8, "#fff7ed");
        roundRect(ctx, tx + 136, ty + 30, 72, 46, 8, "#fff7ed");
        roundRect(ctx, tx + 244, ty + 30, 72, 46, 8, "#fff7ed");
        drawWheel(ctx, tx + 92, ty + 124);
        drawWheel(ctx, tx + 280, ty + 124);

        ctx.fillStyle = "#fff7ed";
        ctx.font = "900 70px 'Microsoft YaHei', sans-serif";
        ctx.fillText(theme[2], x + 110, y + 128);
        ctx.font = "900 46px 'Microsoft YaHei', sans-serif";
        ctx.fillText(theme[3], x + 110, y + 194);
      }

      function shareProfileCopy(key) {
        return {
          utilitarian: {
            headline: "冷静推进的收益号",
            analysis: "这辆电车擅长把混乱路线压缩成可比较的后果，判断果断、载重明确。它的优点是敢于承担复杂计算，也需要记得给不可量化的乘客留一盏灯。"
          },
          deontological: {
            headline: "轨距稳定的原则号",
            analysis: "这辆电车行驶时很少越线，信号灯、边界和承诺都被认真维护。它的优点是可靠、公正、不轻易把人当作工具。"
          },
          empathetic: {
            headline: "柔软但不脆弱的照护号",
            analysis: "这辆电车会放慢速度听见站台上的细小声音，尤其在意具体的人和正在发生的痛感。它的优点是敏锐、温和，也有保护弱者的稳定牵引力。"
          },
          balanced: {
            headline: "多轨并行的权衡号",
            analysis: "这辆电车的驾驶室里同时亮着好几盏仪表灯，转弯前会多看几次岔路。它的优点是谨慎、开放，能在互相冲突的原则之间保持弹性。"
          }
        }[key];
      }

      function drawShareHero(ctx, key, x, y, width, height) {
        const theme = {
          utilitarian: ["#052e16", "#10b981", "Σ", "MAX"],
          deontological: ["#082f49", "#0ea5e9", "§", "ORDER"],
          empathetic: ["#831843", "#fb7185", "♥", "CARE"],
          balanced: ["#312e81", "#f59e0b", "?", "MIX"]
        }[key];
        const gradient = ctx.createLinearGradient(x, y, x + width, y + height);
        gradient.addColorStop(0, theme[0]);
        gradient.addColorStop(1, "#111827");
        roundRect(ctx, x, y, width, height, 18, gradient);

        ctx.fillStyle = "rgba(255,255,255,.1)";
        for (let i = 0; i < 9; i++) {
          ctx.beginPath();
          ctx.arc(x + 60 + i * 45, y + 88 + (i % 2) * 42, 18, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(255,255,255,.18)";
        roundRect(ctx, x + 54, y + height - 170, width - 108, 14, 999, "rgba(255,255,255,.24)");
        roundRect(ctx, x + 54, y + height - 138, width - 108, 8, 999, "rgba(255,255,255,.12)");

        const tx = x + 78;
        const ty = y + height - 300;
        roundRect(ctx, tx, ty, width - 156, 150, 18, theme[1]);
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 7;
        ctx.stroke();
        roundRect(ctx, tx + 28, ty + 34, 70, 54, 8, "#fff7ed");
        roundRect(ctx, tx + 132, ty + 34, 70, 54, 8, "#fff7ed");
        roundRect(ctx, tx + 236, ty + 34, 70, 54, 8, "#fff7ed");
        drawWheel(ctx, tx + 92, ty + 156);
        drawWheel(ctx, tx + 250, ty + 156);

        ctx.fillStyle = "#fff7ed";
        ctx.font = "900 68px 'Microsoft YaHei', sans-serif";
        ctx.fillText(theme[2], tx + 140, ty - 28);
        ctx.font = "900 34px 'Microsoft YaHei', sans-serif";
        ctx.fillText(theme[3], x + 70, y + 118);
      }

      function drawWheel(ctx, x, y) {
        ctx.beginPath();
        ctx.arc(x, y, 38, 0, Math.PI * 2);
        ctx.fillStyle = "#f8fafc";
        ctx.fill();
        ctx.lineWidth = 7;
        ctx.strokeStyle = "#ffffff";
        ctx.stroke();
      }

      function drawShareBar(ctx, label, value, x, y, color) {
        ctx.fillStyle = "#44403c";
        ctx.font = "900 20px 'Microsoft YaHei', sans-serif";
        ctx.fillText(`${label} ${value}%`, x, y);
        roundRect(ctx, x, y + 18, 260, 14, 999, "#e7e5e4");
        roundRect(ctx, x, y + 18, Math.max(8, 260 * value / 100), 14, 999, color);
      }

      function drawGrid(ctx, width, height) {
        ctx.strokeStyle = "rgba(255,255,255,.8)";
        ctx.lineWidth = 1;
        for (let x = 0; x < width; x += 28) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, height);
          ctx.stroke();
        }
        for (let y = 0; y < height; y += 28) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
          ctx.stroke();
        }
      }

      function roundRect(ctx, x, y, width, height, radius, color) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }

      function trimText(ctx, text, x, y, maxWidth) {
        let output = text;
        while (ctx.measureText(output).width > maxWidth && output.length > 4) {
          output = output.slice(0, -2);
        }
        if (output !== text) output += "…";
        ctx.fillText(output, x, y);
      }

      function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        let line = "";
        for (const char of text) {
          const testLine = line + char;
          if (ctx.measureText(testLine).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = char;
            y += lineHeight;
          } else {
            line = testLine;
          }
        }
        if (line) ctx.fillText(line, x, y);
      }

      renderIntro();
    </script>
  </body>
</html>
